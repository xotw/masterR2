<!DOCTYPE html>
<!-- ============================================================================
     DASHBOARD MASTER R2 — Bulldozer Collective
     Tableau de bord de suivi des presentations commerciales R2.
     Application React mono-fichier (pas de build step) : React 18 + Babel standalone.
     Les donnees sont persistees dans le localStorage du navigateur.

     DONNEES INITIALES (SEED) :
     - 10 clients reels issus de HubSpot/Canva (Lotchi, La Tribu Happy Kids, Coface, etc.)
     - 4 Business Partners (Jordan, Enguerrand, Leo, Pierre-Arnaud)
     - Photos de profil BP depuis LinkedIn (URLs directes CDN)
     - Logos clients charges dynamiquement via l'API Clearbit (logo.clearbit.com)

     FONCTIONNALITES CLES :
     - Menu burger par ligne du tableau (ouvrir / dupliquer / supprimer avec confirm natif)
     - Animation BP hover : le nom glisse depuis la droite au survol de l'avatar
       (gere par CSS .bp-hover-wrap:hover .bp-name-slide avec max-width transition)
     - Section "Mes brouillons" dans la sidebar (visible uniquement s'il y a des brouillons)
     - Versioning cle localStorage : STORAGE_KEY = 'master_r2_v12' — incrementer en cas
       de changement de structure pour forcer le rechargement du SEED
     ============================================================================ -->
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/D560BAQEqNfme3YnQxQ/company-logo_200_200/company-logo_200_200/0/1709226778326/bulldozer_collective_logo?e=2147483647&v=beta&t=EfOIpZ5HAlbTa98amRBOd-2GdauQiM950enCKNvnlyU">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Création des prez R2 — Bulldozer</title>

<!-- Dependances externes : React 18 (dev) et Babel pour la transpilation JSX en direct -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ============================== STYLES CSS ============================== -->
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* --- Variables CSS globales ---
     Theme sombre Bulldozer : fond vert-gris fonce, accent jaune-vert fluo (#D4FF00).
     Les variables --text, --text-2, --text-3 definissent 3 niveaux de hierarchie textuelle. */
  :root {
    --bg:        #303028;       /* Fond principal de la page */
    --bg-nav:    #252523;       /* Fond de la barre de navigation laterale */
    --bg-card:   #363632;       /* Fond des cartes (stats, tableau) */
    --bg-input:  #3C3C38;       /* Fond des champs de saisie */
    --bg-hover:  #3A3A36;       /* Fond au survol des elements interactifs */
    --border:    #484844;       /* Bordures generales */
    --text:      #F2F2F7;       /* Texte principal (blanc casse) */
    --text-2:    #AEAEB2;       /* Texte secondaire (gris clair) */
    --text-3:    #6E6E73;       /* Texte tertiaire / labels (gris moyen) */
    --accent:    #D4FF00;       /* Couleur d'accent Bulldozer (jaune-vert fluo) */
    --accent-bg: rgba(212,255,0,0.06); /* Fond subtil pour elements actifs */
    --error:     #FF453A;       /* Rouge d'erreur */
  }
  /* --- Reset et styles de base ---
     Normalisation box-sizing, suppression des marges, scrollbar fine personnalisee. */
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,'Segoe UI',sans-serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
  h1, h2, h3, .nav-title, .top-title, .section-title, .stat-val, .nav-brand { font-family: 'Inconsolata',monospace; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  a { text-decoration: none; color: inherit; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  /* --- Layout principal ---
     .shell : conteneur flex pleine hauteur (nav laterale + zone principale). */
  .shell { display: flex; height: 100vh; overflow: hidden; }

  /* --- Navigation laterale (sidebar gauche) ---
     Barre fixe de 300px contenant : logo, bouton creation, recherche, liste recente, profil. */
  .nav {
    width: 300px; flex-shrink: 0; background: var(--bg-nav);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
  }
  .nav-logo {
    padding: 18px 16px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .nav-logo-img {
    width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
  }
  .nav-title { font-size: 15px; font-weight: 700; }
  .nav-sub   { font-size: 12px; color: var(--text-3); margin-top: 1px; }

  .nav-new-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
  .nav-new {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    border-radius: 6px; background: var(--accent); color: #000; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; border: none; width: 100%;
    justify-content: center;
  }
  .nav-new:hover { background: #B8E600; }

  .nav-search-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
  .nav-search {
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px 8px 32px; font-size: 14px; color: var(--text); width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  .nav-search:focus { border-color: var(--accent); }
  .nav-search::placeholder { color: var(--text-3); }
  .nav-search-icon { position: absolute; left: 23px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-3); pointer-events: none; }

  .nav-section { padding: 12px 14px 5px; font-size: 14px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .nav-list { padding: 0 8px; flex: 1; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 7px; cursor: pointer;
    transition: background 0.1s; margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--bg-hover); }
  .nav-item.active { background: var(--accent-bg); }
  .nav-item-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .nav-item-name { font-size: 14px; font-weight: 500; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-item.active .nav-item-name { color: var(--text); }

  .nav-bottom { border-top: 1px solid var(--border); padding: 8px; }
  .nav-btn {
    display: flex; align-items: center; gap: 8px; padding: 9px 12px;
    border-radius: 7px; cursor: pointer; transition: background 0.1s; width: 100%;
    background: none; border: none; color: var(--text-2); font-size: 14px; font-weight: 500;
  }
  .nav-btn:hover { background: var(--bg-hover); color: var(--text); }

  /* --- Zone principale (panneau droit) ---
     Contient la barre superieure (titre + compteurs), la zone de contenu avec filtres et tableau. */
  .top-bar {
    padding: 20px 36px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); position: sticky; top: 0; z-index: 5;
  }
  .top-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .top-sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }

  .content { padding: 28px 36px; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  /* --- Cartes statistiques ---
     Grille de 3 colonnes affichant les compteurs : total, en cours, terminees. */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 22px;
  }
  .stat-val { font-size: 45px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
  .stat-lbl { font-size: 17px; color: var(--text-3); margin-top: 6px; }

  /* --- Filtres par Business Partner ---
     Pilules cliquables (Tous, Jordan, Enguerrand, Leo, Pierre-Arnaud).
     La classe .on applique le style accent pour le filtre actif. */
  .filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .fp {
    padding: 5px 13px; border-radius: 100px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: transparent;
    color: var(--text-2); transition: all 0.12s;
  }
  .fp:hover { border-color: #4A4A4C; color: var(--text); }
  .fp.on { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* --- Tableau des presentations ---
     Conteneur a scroll interne avec en-tete sticky.
     Chaque ligne affiche : date, client (logo+nom), BP (avatar+nom), leviers, pricing, dates R1/R2, statut, actions. */
  .tbl-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .tbl-wrap table { width: 100%; }
  .tbl-wrap thead { position: sticky; top: 0; z-index: 2; background: var(--bg-card); }
  .tbl-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .main { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 12px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg-hover); cursor: pointer; }
  tbody td { padding: 8px 12px; vertical-align: middle; }

  /* --- Cellule client : identifiant (mono), nom en gras, URL tronquee --- */
  .client-id   { font-size: 13px; font-weight: 700; color: var(--accent); font-family: "SF Mono","Fira Code",monospace; letter-spacing: 0.04em; }
  .client-name { font-weight: 800; font-size: 16px; letter-spacing: -0.02em; margin-top: 2px; }
  .client-url  { font-size: 12px; color: var(--text-3); margin-top: 2px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* --- Cellule Business Partner : avatar colore + nom + role --- */
  .bp-cell  { display: flex; align-items: center; gap: 10px; }
  .bp-hover-wrap { cursor: default; white-space: nowrap; justify-content: center; }
  .bp-hover-wrap .bp-av-img { flex-shrink: 0; transition: none; }
  .bp-hover-wrap .bp-name-slide {
    display: inline-block; max-width: 0; opacity: 0; overflow: hidden;
    transition: max-width 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
    font-size: 13px; font-weight: 600; color: var(--text-2); vertical-align: middle; margin-left: 0;
  }
  .bp-hover-wrap:hover .bp-name-slide { max-width: 120px; opacity: 1; margin-left: 6px; }
  .bp-av    { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
  .bp-name  { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .bp-role  { font-size: 12px; color: var(--text-3); }

  /* --- Badges de leviers marketing (SEO, CRO, Google Ads, etc.) ---
     Petites etiquettes colorees selon LEVER_COLORS dans le JS. */
  .levers   { display: flex; gap: 3px; flex-wrap: wrap; }
  .lv       { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--text-2); font-family: "SF Mono",monospace; }

  /* --- Badge de statut (brouillon / en cours / terminee) ---
     Cliquable : chaque clic fait cycler le statut via cycleStatus(). */
  .sbadge   { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .sbadge:hover { opacity: 0.8; }
  .sdot     { width: 6px; height: 6px; border-radius: 50%; }

  /* --- Colonne Actions : bouton Canva + menu burger (ouvrir/dupliquer/supprimer) --- */
  .acts { display: flex; gap: 8px; align-items: center; }
  .burger-wrap { position: relative; }
  .burger-btn {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.12s;
  }
  .burger-btn:hover { border-color: #4A4A4C; color: var(--text); background: var(--bg-hover); }
  .burger-menu {
    display: none; position: absolute; right: 0; top: calc(100% + 4px);
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    min-width: 160px; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .burger-wrap.open .burger-menu { display: block; }
  .burger-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 13px;
    color: var(--text-2); cursor: pointer; transition: background 0.1s; border: none;
    background: none; width: 100%; text-align: left;
  }
  .burger-item:hover { background: var(--bg-hover); color: var(--text); }
  .burger-item.danger { color: var(--error); }
  .burger-item.danger:hover { background: rgba(255,69,58,0.08); }
  .btn-canva {
    background: #fff; border-radius: 5px; display: inline-flex;
    align-items: center; justify-content: center; gap: 5px; padding: 5px 12px;
    transition: opacity 0.15s; flex-shrink: 0; border: none; cursor: pointer; white-space: nowrap;
    font-size: 13px; font-weight: 600;
  }
  .btn-canva:hover { opacity: 0.85; }
  .btn-canva img { width: 32px; height: 20px; object-fit: contain; display: block; }
  .btn-edit {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.12s;
    color: var(--text-2); text-decoration: none; white-space: nowrap;
  }
  .btn-edit:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--text); }

  /* --- Etat vide : affiche quand aucune presentation ne correspond aux filtres --- */
  .empty { text-align: center; padding: 72px 20px; }
  .empty-icon  { font-size: 45px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-sub   { font-size: 14px; color: var(--text-3); }
</style>
</head>
<body>
<!-- Point de montage React : l'application entiere est rendue dans cette div -->
<div id="root"></div>

<!-- ============================== APPLICATION REACT ==============================
     Transpile par Babel en direct (type="text/babel").
     Architecture : composants fonctionnels avec hooks (useState, useEffect, useMemo).
     Persistance : les donnees sont lues/ecrites dans le localStorage.
     ============================================================================= -->
<script src="api.js"></script>
<script type="text/babel">
// Hooks React utilises dans l'application
const { useState, useEffect, useMemo } = React;

/* ---------------------------------------------------------------------------
   CONSTANTES DE CONFIGURATION
   --------------------------------------------------------------------------- */

// Liste des Business Partners (BP) de Bulldozer Collective.
// Chaque BP a une couleur d'avatar et un role (Fondateur ou Business Partner).
// 'tc' = text color (couleur du texte sur l'avatar colore).
let BPS = [
  { name:'Jordan',        role:'Fondateur',        color:'#D4FF00', tc:'#000', photo:'https://media.licdn.com/dms/image/v2/D4D03AQHiOsHCMbDmmA/profile-displayphoto-shrink_800_800/B4DZUfIgeIHkAc-/0/1739984079211?e=1777507200&v=beta&t=gaJ2BLoTZH9XIFZiKbTlHSHazz4Cso452lxnjKGE11M' },
  { name:'Enguerrand',    role:'Fondateur',        color:'#60A5FA', tc:'#000', photo:'https://media.licdn.com/dms/image/v2/D4E03AQETmOP0jjO2KA/profile-displayphoto-shrink_800_800/B4EZUfUHUuHcAc-/0/1739987124974?e=1777507200&v=beta&t=O7nSUnZlbv7vbeznBqSSM5kYT6BRDXFM3IeU66YcGVo' },
  { name:'Léo',           role:'Business Partner', color:'#F97316', tc:'#fff', photo:'https://media.licdn.com/dms/image/v2/D4E03AQF_3ZMD7mdT6w/profile-displayphoto-shrink_800_800/B4EZVG_Yw8GwAc-/0/1740652776934?e=1777507200&v=beta&t=2BGOfJ_kA8RGUMaOfDLxQK92UKMFEqcMBrfE3N6Umwc' },
  { name:'Pierre-Arnaud', role:'Business Partner', color:'#A78BFA', tc:'#fff', photo:'https://media.licdn.com/dms/image/v2/D5603AQEbkmn09Com0g/profile-displayphoto-crop_800_800/B56ZzEKW5aGQAI-/0/1772817576081?e=1777507200&v=beta&t=9VP6NDkbf76spDoF3FdE_IhBIs86p1_xgOiP-1c1hlw' },
];

// Icones emoji associees a chaque levier marketing (affichees dans la nav laterale)
const LEVER_ICONS  = { SEO:'🔍', GEO:'🤖', CRO:'⚡', 'Google Ads':'💰', 'Meta Ads':'📣', 'LinkedIn Ads':'💼' };
// Couleurs de fond et de texte pour les badges de levier dans le tableau.
// Chaque levier a sa propre couleur pastel pour identification rapide.
const LEVER_COLORS = {
  'SEO':          { bg:'#C8F040', color:'#1C1C1E' },
  'GEO':          { bg:'#70D8D0', color:'#1C1C1E' },
  'CRO':          { bg:'#FF9870', color:'#1C1C1E' },
  'Google Ads':   { bg:'#80C8FF', color:'#1C1C1E' },
  'Meta Ads':     { bg:'#D0A0FF', color:'#1C1C1E' },
  'LinkedIn Ads': { bg:'#FFB0C8', color:'#1C1C1E' },
};
/* ---------------------------------------------------------------------------
   CONFIGURATION DES STATUTS
   Definit l'apparence (label, couleur, fond) de chaque statut de presentation.
   'envoye' est traite comme 'terminee' visuellement (meme style vert).
   STATUS_CYCLE : ordre de rotation quand on clique sur un badge de statut.
   --------------------------------------------------------------------------- */
const STATUS_CFG = {
  brouillon:{ label:'Brouillon', color:'#6E6E73', bg:'rgba(110,110,115,0.12)' },
  en_cours: { label:'En cours',  color:'#FF9F0A', bg:'rgba(255,159,10,0.12)'  },
  terminee: { label:'Terminée',  color:'#32D74B', bg:'rgba(50,215,75,0.12)'   },
  envoye:   { label:'Terminée',  color:'#32D74B', bg:'rgba(50,215,75,0.12)'   },
};
// Cycle des statuts : brouillon -> en_cours -> terminee -> brouillon (boucle)
const STATUS_CYCLE = ['brouillon','en_cours','terminee'];

/* ---------------------------------------------------------------------------
   FONCTIONS UTILITAIRES
   --------------------------------------------------------------------------- */

// Persistence now handled by api.js — no localStorage

// Formate une date ISO en format court francais (ex: "3 avr.")
function fmtDate(iso)    { return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }

// Retrouve un Business Partner par son nom. Fallback sur BPS[2] (Leo) si inconnu.
function getBP(name)     { return BPS.find(b=>b.name===name)||BPS[2]; }

// Extrait les initiales d'un nom (gere les tirets et espaces). Ex: "Pierre-Arnaud" -> "PA"
function initials(name)  { return name.split(/[-\s]/).map(p=>p[0]).join('').toUpperCase().slice(0,2); }

// Genere l'URL du logo client via l'API Clearbit a partir de l'URL du site web.
function logoUrl(url)    { try { const d=new URL(url).hostname; return `https://logo.clearbit.com/${d}?size=64`; } catch{ return null; } }

/* ---------------------------------------------------------------------------
   COMPOSANTS REACT
   --------------------------------------------------------------------------- */

/**
 * BPAv — Avatar du Business Partner
 * Cercle colore affichant les initiales du BP.
 * La taille est configurable (defaut 30px), la couleur provient de la config BPS.
 */
function BPAv({ name, size=30 }) {
  const bp = getBP(name);
  return bp.photo
    ? <img src={bp.photo} alt={name} style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:`2px solid ${bp.color}`}}/>
    : <div className="bp-av" style={{width:size,height:size,background:bp.color,color:bp.tc,fontSize:size*0.36}}>{initials(name)}</div>;
}

/**
 * SBadge — Badge de statut cliquable
 * Affiche le statut actuel (Brouillon / En cours / Terminee) avec un point colore.
 * Le clic declenche le cycle vers le statut suivant (via cycleStatus dans App).
 */
function SBadge({ status, onClick }) {
  const s = STATUS_CFG[status] || STATUS_CFG.brouillon;
  return (
    <span className="sbadge" title="Cliquer pour changer" onClick={onClick} style={{background:s.bg,color:s.color}}>
      <span className="sdot" style={{background:s.color}}/>{s.label}
    </span>
  );
}

/**
 * App — Composant principal du dashboard
 * Gere l'etat global : liste des presentations, filtre par BP, recherche textuelle,
 * et l'utilisateur connecte (lu depuis les parametres dans le localStorage).
 */
function App() {
  // pres : tableau de toutes les presentations (source de verite locale)
  const [pres, setPres]         = useState([]);
  // filter : nom du BP selectionne dans les pilules de filtre ('Tous' par defaut)
  const [filter, setFilter]     = useState('Tous');
  // search : texte saisi dans la barre de recherche de la nav laterale
  const [search, setSearch]     = useState('');
  // currentUser / currentUserBp : utilisateur connecte et ses infos BP (depuis les parametres)
  const [currentUser, setCU]    = useState(null);
  const [currentUserBp, setCUBp]= useState(null);
  // openMenu : id de la présentation dont le menu burger est ouvert (null = tous fermés)
  const [openMenu, setOpenMenu] = useState(null);

  /** Duplique une presentation existante.
      Genere un nouvel ID unique (prefixe 'd' + timestamp base36) et un numero
      sequentiel (R2-XXX) base sur la taille actuelle du tableau.
      La copie est inseree en tete du tableau (la plus recente en premier). */
  async function duplicatePres(p) {
    const result = await apiDuplicatePresentation(p.id);
    const d = await apiFetchPresentations();
    setPres(d);
    setOpenMenu(null);
  }

  /** Supprime une presentation apres confirmation utilisateur.
      Le confirm() natif empeche les suppressions accidentelles (surtout
      utile car le clic sur le menu burger est proche du clic sur la ligne). */
  async function deletePres(id) {
    if(!confirm('Supprimer cette présentation ?')) return;
    await apiDeletePresentation(id);
    setPres(prev => prev.filter(p=>p.id!==id));
    setOpenMenu(null);
  }

  /* ── Fermeture du menu burger au clic externe ──
     Attache un listener global qui ferme le menu contextuel (ouvrir/dupliquer/supprimer)
     quand l'utilisateur clique n'importe ou sur la page. Les boutons du menu
     utilisent stopPropagation() pour empecher cette fermeture prematuree. */
  useEffect(()=>{
    const close=()=>setOpenMenu(null);
    window.addEventListener('click',close);
    return()=>window.removeEventListener('click',close);
  },[]);

  /* ── Initialisation au montage ──
     1) Charge les presentations depuis localStorage (STORAGE_KEY).
        Si le localStorage est vide (premier lancement), injecte le SEED
        (jeu de donnees de demo avec 12 presentations pre-remplies) et le persiste.
     2) Charge les parametres utilisateur (cle 'master_r2_settings') pour
        afficher le profil connecte en bas de la nav laterale.
        Migration des photos : si un BP dans les settings n'a pas de photo mais
        que la constante BPS en a une (ajoutee apres), on la merge automatiquement. */
  useEffect(() => {
    (async () => {
      try {
        const d = await apiFetchPresentations();
        setPres(d);
        const bps = await apiFetchBPs();
        BPS.length = 0; BPS.push(...bps);
        // Settings: currentUser still from localStorage for now
        const s = JSON.parse(localStorage.getItem('master_r2_settings')||'null');
        if (s?.currentUser) {
          setCU(s.currentUser);
          let bp = BPS.find(b=>b.name===s.currentUser);
          setCUBp(bp||null);
        }
      } catch (err) { console.error('Init error:', err); }
    })();
  }, []);

  // --- Filtrage memoize ---
  // Combine le filtre par BP et la recherche textuelle (nom client ou nom BP).
  // Recalcule uniquement quand pres, filter ou search changent.
  const filtered = useMemo(() => {
    let r = filter==='Tous' ? pres : pres.filter(p=>p.bp===filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(p => p.clientName.toLowerCase().includes(q) || p.bp.toLowerCase().includes(q));
    }
    return r;
  }, [pres, filter, search]);

  // --- Cycle de statut ---
  // Au clic sur un badge statut, passe au statut suivant dans STATUS_CYCLE
  // (brouillon -> en_cours -> terminee -> brouillon).
  // Met a jour l'etat React ET persiste dans le localStorage.
  // e.stopPropagation() empeche le clic de naviguer vers la page de detail.
  function cycleStatus(id, e) {
    e.stopPropagation();
    const p = pres.find(x=>x.id===id);
    if (!p) return;
    const i = STATUS_CYCLE.indexOf(p.status);
    const newStatus = STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];
    apiUpdateStatus(id, newStatus);
    setPres(prev => prev.map(x => x.id===id ? {...x, status:newStatus} : x));
  }

  // --- Compteurs pour la barre superieure et les filtres ---
  const nTotal   = pres.length;                                                        // Nombre total de presentations
  const nCours   = pres.filter(p=>p.status==='en_cours').length;                       // Nombre en cours de creation
  const nTermine = pres.filter(p=>p.status==='terminee'||p.status==='envoye').length;  // Nombre terminees (ou envoyees)

  // Les 6 presentations les plus recentes, triees par date de creation (affichees dans la nav laterale)
  const recent = [...pres].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);

  // Brouillons : presentations en statut 'brouillon'
  const drafts = pres.filter(p=>p.status==='brouillon');

  // --- RENDU JSX ---
  return (
    <div className="shell">
      {/* ============ NAVIGATION LATERALE GAUCHE ============
          Structure : logo > bouton creation > bouton accueil > recherche > liste recente > aide/parametres/profil */}
      <nav className="nav">
        {/* Logo et nom de l'agence — clic pour revenir a l'accueil */}
        <div className="nav-logo" style={{cursor:'pointer'}}>
          <img
            className="nav-logo-img"
            src="https://media.licdn.com/dms/image/v2/D560BAQEqNfme3YnQxQ/company-logo_200_200/company-logo_200_200/0/1709226778326/bulldozer_collective_logo?e=2147483647&v=beta&t=EfOIpZ5HAlbTa98amRBOd-2GdauQiM950enCKNvnlyU"
            alt="Bulldozer"
            onClick={()=>window.location.href='home.html'}
          />
          <div onClick={()=>window.location.href='index.html'}>
            <div className="nav-title">Bulldozer collective</div>
            <div className="nav-sub">Création des prez R2</div>
          </div>
        </div>

        {/* Bouton CTA principal : creer une nouvelle presentation R2 */}
        <div className="nav-new-wrap">
          <button className="nav-new" onClick={()=>window.location.href='nouveau.html'}>Nouvelle présentation</button>
        </div>

        {/* Bouton "Accueil" — surligne pour indiquer la page courante */}
        <div style={{padding:'6px 8px'}}>
          <button className="nav-btn" style={{background:'var(--accent-bg)',color:'var(--text)',border:'1px solid rgba(212,255,0,0.15)'}} onClick={()=>window.location.href='index.html'}>
            🏠 Accueil
          </button>
        </div>

        {/* Barre de recherche — filtre en temps reel sur le nom client et le nom du BP */}
        <div className="nav-search-wrap" style={{position:'relative'}}>
          <span className="nav-search-icon">🔍</span>
          <input className="nav-search" placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>

        {/* ── Section "Mes brouillons" ──
            Affiche les presentations en statut 'brouillon' separement des recentes,
            avec un indicateur orange pour signaler qu'elles sont en attente de finalisation.
            N'apparait que s'il y a au moins un brouillon. */}
        {drafts.length>0&&(<>
          <div className="nav-section">Mes brouillons ({drafts.length})</div>
          <div style={{padding:'0 8px'}}>
            {drafts.map(p=>(
              <div key={p.id} className="nav-item" onClick={()=>window.location.href=`nouveau.html?id=${p.id}`}>
                <div className="nav-item-left">
                  <span style={{width:8,height:8,borderRadius:'50%',background:'#FF9F0A',flexShrink:0}}/>
                  <span className="nav-item-name">{p.clientName||'Sans nom'}</span>
                </div>
                <span style={{fontSize:14,color:'var(--text-3)',flexShrink:0,marginLeft:4}}>{fmtDate(p.createdAt)}</span>
              </div>
            ))}
          </div>
        </>)}

        {/* ── Section "Recent" dans la sidebar ──
            Affiche les 6 presentations les plus recentes avec :
            - Logo client via Clearbit (avec fallback sur l'icone du levier principal si logo indisponible)
            - Nom du client
            - Date de creation en format court francais
            Chaque item redirige vers le formulaire d'edition au clic. */}
        <div className="nav-section">Récent</div>
        <div className="nav-list">
          {recent.map(p => (
            <div key={p.id} className="nav-item" onClick={()=>window.location.href=`nouveau.html?id=${p.id}`}>
              <div className="nav-item-left">
                {/* Logo Clearbit du client ; si indisponible, affiche l'emoji du premier levier actif */}
                {logoUrl(p.clientWebsiteUrl)?<img src={logoUrl(p.clientWebsiteUrl)} alt="" style={{width:18,height:18,borderRadius:4,objectFit:'contain',background:'#fff',flexShrink:0}} onError={e=>{e.target.style.display='none';}}/>:<span style={{fontSize:14}}>{LEVER_ICONS[p.activeLevers[0]]||'📋'}</span>}
                <span className="nav-item-name">{p.clientName}</span>
              </div>
              <span style={{fontSize:14,color:'var(--text-3)',flexShrink:0,marginLeft:4}}>{fmtDate(p.createdAt)}</span>
            </div>
          ))}
          {recent.length===0 && <div style={{fontSize:14,color:'var(--text-3)',padding:'8px 10px'}}>Aucune présentation</div>}
        </div>

        {/* Pied de la nav : liens aide/parametres + profil utilisateur connecte (si defini).
            L'avatar du profil reprend la couleur du BP correspondant. */}
        <div className="nav-bottom">
          <button className="nav-btn" onClick={()=>window.location.href='aide.html'}>❓ Aide</button>
          <button className="nav-btn" onClick={()=>window.location.href='parametres.html'}>⚙️ Paramètres</button>
          {/* ── Profil utilisateur connecte ──
              Affiche l'avatar du BP (photo LinkedIn si disponible, sinon initiales
              sur cercle colore) + nom + role. Clic redirige vers les parametres.
              L'avatar a une bordure coloree assortie a la couleur du BP.
              Si aucun utilisateur n'est connecte (currentUser null), rien n'est affiche. */}
          {currentUser && (
            <div style={{borderTop:'1px solid var(--border)',marginTop:6,paddingTop:6}}>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 10px',borderRadius:8,cursor:'pointer',transition:'background 0.1s'}}
                onClick={()=>window.location.href='parametres.html'}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                {currentUserBp?.photo
                  ? <img src={currentUserBp.photo} alt={currentUser} style={{width:36,height:36,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:`2px solid ${currentUserBp.color}`}}/>
                  : <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13,background:currentUserBp?.color||'#D4FF00',color:currentUserBp?.tc||'#000'}}>{initials(currentUser)}</div>
                }
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentUser}</div>
                  <div style={{fontSize:14,color:'var(--text-3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentUserBp?.role||'Utilisateur'}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      </nav>

      {/* ============ PANNEAU PRINCIPAL (droite) ============
          Contient : barre superieure avec titre et compteurs, zone de contenu avec filtres et tableau. */}
      <div className="main">
        {/* Barre superieure sticky : titre de la page + compteurs rapides (total / en cours / terminees) */}
        <div className="top-bar">
          <div>
            <div className="top-title">Toutes les présentations commerciales</div>
            <div className="top-sub">Historique de toutes les présentations générées par les Business Partners</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{display:'flex',gap:14,alignItems:'center'}}>
              <span style={{fontSize:14,color:'var(--text-3)'}}><strong style={{fontSize:16,color:'var(--text)'}}>{nTotal}</strong> Total</span>
              <span style={{fontSize:14,color:'var(--text-3)'}}><strong style={{fontSize:16,color:'#FF9F0A'}}>{nCours}</strong> En cours</span>
              <span style={{fontSize:14,color:'var(--text-3)'}}><strong style={{fontSize:16,color:'#32D74B'}}>{nTermine}</strong> Terminées</span>
            </div>
          </div>
        </div>

        <div className="content">

          {/* Pilules de filtre par Business Partner.
              "Tous" affiche tout. Chaque BP affiche son nombre de presentations entre parentheses.
              Le filtre actif recoit la classe .on (fond accent jaune-vert). */}
          <div className="filters">
            <button className={`fp${filter==='Tous'?' on':''}`} onClick={()=>setFilter('Tous')}>Tous ({nTotal})</button>
            {BPS.map(bp => {
              const n = pres.filter(p=>p.bp===bp.name).length;
              return <button key={bp.name} className={`fp${filter===bp.name?' on':''}`} onClick={()=>setFilter(bp.name)}>{bp.name}{n?` (${n})`:''}</button>;
            })}
          </div>

          {/* ============ TABLEAU DES PRESENTATIONS ============
              Si aucun resultat apres filtrage : affiche un etat vide avec message contextuel.
              Sinon : tableau scrollable avec en-tete sticky.
              Colonnes : Creation | Client | BP | Leviers | Pricing | Date R1 | Date R2 | Statut | Actions */}
          <div className="tbl-wrap">
            {filtered.length===0 ? (
              <div className="empty">
                <div className="empty-icon">📋</div>
                <div className="empty-title">{search?`Aucun résultat pour "${search}"`:filter!=='Tous'?`Aucune présentation pour ${filter}`:'Aucune présentation'}</div>
                <div className="empty-sub">Créez votre première présentation R2.</div>
              </div>
            ) : (
              <div className="tbl-scroll"><table>
                <thead>
                  <tr>
                    <th>Création</th>
                    <th>Client</th>
                    <th>Business Partner</th>
                    <th>Leviers</th>
                    <th>Pricing</th>
                    <th>Date R1</th>
                    <th>Date R2</th>
                    <th>Statut</th>
                    <th></th>
                  </tr>
                </thead>
                {/* Chaque ligne est cliquable : redirige vers nouveau.html?id=XX pour editer la presentation.
                    Les cellules statut et actions utilisent stopPropagation pour eviter la navigation au clic. */}
                <tbody>
                  {filtered.map(p => (
                    <tr key={p.id} onClick={()=>window.location.href=`nouveau.html?id=${p.id}`}>
                      <td style={{color:'var(--text-2)',fontSize:14,whiteSpace:'nowrap'}}>{fmtDate(p.createdAt)}</td>
                      {/* Cellule Client : logo via Clearbit API + nom + URL.
                          Le logo est charge a partir du domaine du site client
                          (ex: logo.clearbit.com/qonto.com). onError masque l'image
                          si le logo n'existe pas chez Clearbit (client inconnu ou hors ligne). */}
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          {logoUrl(p.clientWebsiteUrl)&&<img src={logoUrl(p.clientWebsiteUrl)} alt="" style={{width:28,height:28,borderRadius:6,objectFit:'contain',background:'#fff',flexShrink:0}} onError={e=>{e.target.style.display='none';}}/>}
                          <div>
                            <div className="client-name">{p.clientName}</div>
                            <div className="client-url">{p.clientWebsiteUrl}</div>
                          </div>
                        </div>
                      </td>
                      {/* Cellule BP : animation hover qui revele le nom a cote de l'avatar.
                        Le nom est cache par defaut (max-width:0, opacity:0) et s'anime
                        au survol via les regles CSS .bp-hover-wrap:hover .bp-name-slide.
                        Cela economise de l'espace dans le tableau tout en permettant
                        d'identifier le BP sans cliquer. */}
                    <td>
                        <div className="bp-hover-wrap" style={{display:'flex',alignItems:'center'}}>
                          <span className="bp-av-img"><BPAv name={p.bp} size={28} /></span>
                          <span className="bp-name-slide">{p.bp}</span>
                        </div>
                      </td>
                      <td>
                        <div className="levers">
                          {p.activeLevers.map(l=>{const lc=LEVER_COLORS[l]||{bg:'rgba(255,255,255,0.08)',color:'var(--text-2)'};return <span key={l} className="lv" style={{background:lc.bg,color:lc.color}}>{l}</span>;})}
                        </div>
                      </td>
                      <td style={{fontSize:14,whiteSpace:'nowrap'}}>
                        {p.pricing ? <span style={{fontWeight:600,color:'var(--text)'}}>{p.pricing}</span> : <span style={{color:'var(--text-3)'}}>—</span>}
                      </td>
                      <td style={{color:'var(--text-2)',fontSize:14,whiteSpace:'nowrap'}}>{p.dateR1 ? fmtDate(p.dateR1) : <span style={{color:'var(--text-3)'}}>—</span>}</td>
                      <td style={{color:'var(--text-2)',fontSize:14,whiteSpace:'nowrap'}}>{p.dateR2 ? fmtDate(p.dateR2) : <span style={{color:'var(--text-3)'}}>—</span>}</td>
                      <td onClick={e=>e.stopPropagation()}>
                        <SBadge status={p.status} onClick={e=>cycleStatus(p.id,e)} />
                      </td>
                      {/* ── Colonne Actions ──
                          Bouton Canva : lien direct vers le design (ouvre dans un nouvel onglet).
                          Affiche un espace vide si aucune URL Canva n'est renseignee.
                          Menu burger (⋯) : Ouvrir / Dupliquer / Supprimer.
                          stopPropagation() sur chaque action empeche le clic de declencher
                          la navigation de la ligne (qui redirige vers nouveau.html?id=XX). */}
                      <td onClick={e=>e.stopPropagation()}>
                        <div className="acts">
                          {p.canvaUrl ? (
                            <a href={p.canvaUrl} target="_blank" className="btn-canva" title="Ouvrir dans Canva" onClick={e=>e.stopPropagation()}>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Canva_logo.svg/3840px-Canva_logo.svg.png" alt="Canva" />
                            </a>
                          ) : <div style={{width:50}}/>}
                          <div className={`burger-wrap${openMenu===p.id?' open':''}`}>
                            <button className="burger-btn" onClick={e=>{e.stopPropagation();setOpenMenu(openMenu===p.id?null:p.id);}}>⋯</button>
                            <div className="burger-menu">
                              <a href={`nouveau.html?id=${p.id}`} className="burger-item" onClick={e=>e.stopPropagation()}>Ouvrir</a>
                              <button className="burger-item" onClick={e=>{e.stopPropagation();duplicatePres(p);}}>Dupliquer</button>
                              <button className="burger-item danger" onClick={e=>{e.stopPropagation();deletePres(p.id);}}>Supprimer</button>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table></div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// Point d'entree : monte le composant App dans la div #root via React 18 createRoot
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

     3. Injection du contexte client (entreprise, enjeux, challenges)
     4. Injection des analyses par levier (notes + sous-scores + descriptions)
     5. Suppression des slides desactivees
     6. Verification finale de coherence
     Le JSON complet est inclus a la fin pour reference. */
  const canvaPrompt=`Tu es un assistant qui met à jour une présentation Canva pour Bulldozer Collective.

## Présentation cible
- Client : ${state.clientName}
- URL Canva : ${state.canvaUrl || 'Template ID: ' + state.canvaTemplateId}
- Business Partner : ${state.bp}

## Actions à réaliser (dans l'ordre)

### 1. Dupliquer le template
Utilise le MCP Canva pour dupliquer le design source et travailler sur la copie.

### 2. Find & Replace
Remplace toutes les occurrences de "XXX" par "${state.clientName}" dans l'ensemble de la présentation.

### 3. Injection du contexte client (slides ~8-9)
${json.content.context_summary.entreprise ? '- Entreprise : ' + json.content.context_summary.entreprise : '- Entreprise : (vide)'}
${json.content.context_summary.enjeux ? '- Enjeux : ' + json.content.context_summary.enjeux : '- Enjeux : (vide)'}
${json.content.context_summary.challenges ? '- Challenges : ' + json.content.context_summary.challenges : '- Challenges : (vide)'}

### 4. Injection des analyses par levier
${state.activeLevers.map(l=>{const a=json.content.analyses[l];if(!a)return `#### ${l}\n(non générée)`;return `#### ${l} — Note : ${a.note_globale}/10\nLecture business : ${a.lecture_business}\n${a.sous_scores.map(ss=>`- ${ss.nom} : ${ss.note}/10 — ${ss.description}`).join('\n')}`;}).join('\n\n')}

### 5. Slides à supprimer
${inactiveList}

### 6. Vérification finale
Vérifie que toutes les slides sont cohérentes, qu'il n'y a plus de "XXX" et que les notes sont bien injectées.

## JSON complet
\`\`\`json
${jsonStr}
\`\`\``;

  /* Liste des taches affichees dans l'animation de generation (phase 'running').
     Chaque tache dure STEP_DURATION ms (4s) et est animee sequentiellement.
     Les taches par levier sont dynamiques (une par levier actif).
     Le TDT (test de traction) n'est inclus que s'il est actif. */
  const tasks=[
    {label:'Duplication du template Canva',          icon:'📄'},
    {label:`Find & Replace "XXX" → "${state.clientName}"`, icon:'🔤'},
    {label:'Injection du contexte client (slide 9)',  icon:'📋'},
    ...state.activeLevers.map(l=>({label:`Injection analyse ${l}`, icon:LEVER_ICONS[l]||'📊', lever:l})),
    ...(!state.inactiveSections.includes('test_traction')?[{label:'Injection du Test de traction', icon:'🧪'}]:[]),
    {label:'Suppression des slides désactivées',      icon:'✂️'},
    {label:'Vérification finale de cohérence',        icon:'✅'},
  ];

  const STEP_DURATION=4000; // Duree de chaque tache animee en ms

  useEffect(()=>{
    if(phase!=='running') return;
    startRef.current=Date.now();
    const tick=()=>{
      const now=Date.now();
      const total=now-startRef.current;
      setElapsed(total);
      const idx=Math.min(Math.floor(total/STEP_DURATION),tasks.length);
      setTaskIdx(idx);
      if(idx>=tasks.length){
        setPhase('done');
      } else {
        timerRef.current=requestAnimationFrame(tick);
      }
    };
    timerRef.current=requestAnimationFrame(tick);
    return()=>{if(timerRef.current) cancelAnimationFrame(timerRef.current);};
  },[phase]);

  /** Lance l'injection Canva :
      1. Copie le prompt complet dans le presse-papier
      2. Ajoute une entree d'historique en statut 'running' avec un snapshot du JSON actuel
      3. Demarre l'animation de progression (phase 'running') */

  /* ── Raccourcis clavier Step 4 ──
     Enter ou ArrowRight declenchent deux actions selon la phase :
     - phase 'idle' + contenu complet + pas readOnly : lance la generation (launch())
     - phase 'done' : enregistre la prez comme 'terminee', marque isExisting=true
       (pour desactiver le beforeunload), puis redirige vers le dashboard.
     Desactive dans les champs de saisie pour ne pas interferer avec l'edition. */
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if(e.key==='Enter'||e.key==='ArrowRight'){
        e.preventDefault();
        if(phase==='idle'&&isComplete&&!readOnly) launch();
        if(phase==='done'){upsert({...state,status:'terminee'});setIsExisting(true);window.location.href='index.html';}
      }
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[phase,isComplete,readOnly]);

  function launch(){
    copy(canvaPrompt,()=>toastFn('Prompt copié — collez-le dans Claude'));
    setPhase('running');
    setTaskIdx(0);
    setElapsed(0);
    setHistory(h=>[{date:new Date().toISOString(),levers:[...state.activeLevers],status:'running',snapshot:json},...h]);
  }

  /* Quand l'animation se termine (phase passe a 'done'), met a jour la premiere
     entree de l'historique (celle en 'running') avec la duree reelle et le statut 'done'.
     Marque aussi la presentation comme 'terminee' dans le localStorage. */
  useEffect(()=>{
    if(phase==='done'&&history.length>0&&history[0].status==='running'){
      setHistory(h=>[{...h[0],status:'done',duration:elapsed},...h.slice(1)]);
      upsert({id:state.id,status:'terminee'});
    }
  },[phase]);

  const fmtTimer=(ms)=>{const s=Math.floor(ms/1000);const m=Math.floor(s/60);return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;};

  return (
    <div style={{padding:'48px 48px',minHeight:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,margin:0,letterSpacing:'-0.02em',display:'flex',alignItems:'center',gap:10}}>{state.clientWebsiteUrl&&logoUrl(state.clientWebsiteUrl)&&<img src={logoUrl(state.clientWebsiteUrl)} alt="" style={{width:24,height:24,borderRadius:5,objectFit:'contain',background:'#fff'}} onError={e=>{e.target.style.display='none';}}/>}{state.clientName ? <>Canva — <span style={{color:'var(--accent)'}}>{state.clientName}</span></> : 'Canva'}</h1>
          <p style={{color:'var(--text-3)',marginTop:6,fontSize:15,margin:'6px 0 0'}}>
            {phase==='idle'?'Injectez le contenu validé dans la présentation Canva.':phase==='done'?'Injection terminée.':'Injection en cours...'}
          </p>
        </div>
        {phase!=='idle'&&(
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:phase==='done'?'#32D74B':'var(--accent)',boxShadow:phase==='running'?'0 0 8px rgba(212,255,0,0.6)':undefined,animation:phase==='running'?'pulse 1.5s ease infinite':undefined}}/>
            <span style={{fontFamily:'"SF Mono","Fira Code",monospace',fontSize:18,fontWeight:700,color:phase==='done'?'#32D74B':'var(--text)',letterSpacing:'0.05em'}}>{fmtTimer(elapsed)}</span>
          </div>
        )}
      </div>

      {phase==='idle' ? (
        <>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            {/* Left — Récap */}
            <div className="card" style={{padding:'12px 16px'}}>
              <div style={{fontWeight:700,marginBottom:10,fontSize:15}}>Récapitulatif</div>
              <div style={{display:'flex',gap:20,alignItems:'flex-start',marginBottom:12}}>
                <div>
                  <span style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.07em'}}>Client</span>
                  <div style={{fontSize:14,fontWeight:600,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                    {state.clientWebsiteUrl&&logoUrl(state.clientWebsiteUrl)&&<img src={logoUrl(state.clientWebsiteUrl)} alt="" style={{width:18,height:18,borderRadius:4,objectFit:'contain',background:'#fff'}} onError={e=>{e.target.style.display='none';}}/>}
                    {state.clientName||'—'}
                  </div>
                </div>
                <div>
                  <span style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.07em'}}>Template</span>
                  <div style={{fontSize:14,fontWeight:600,marginTop:2}}>{state.canvaUrl?'Lien Canva':state.canvaTemplateId||'—'}</div>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <span style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.07em'}}>Leviers</span>
                <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:4}}>
                  {state.activeLevers.map(l=>{const lc=LEVER_COLORS[l]||{bg:'rgba(255,255,255,0.08)',color:'var(--text-2)'};return <span key={l} style={{fontSize:11,fontWeight:700,padding:'2px 6px',borderRadius:3,background:lc.bg,color:lc.color,fontFamily:'"SF Mono",monospace'}}>{l}</span>;})}
                </div>
              </div>
              <div style={{borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',gap:8}}>
                <button className="btn-g" style={{flex:1,justifyContent:'center'}} onClick={()=>copy(jsonStr,()=>toastFn('JSON copié !'))}>Copier le JSON</button>
              </div>

              {/* ── Checklist "Ce qu'il vous reste à faire" ──
                  Liste mixte d'actions automatisees (done:true, en vert) et manuelles (done:false, en orange).
                  Sert de pense-bete pour le BP : les taches vertes sont deja realisees par Claude,
                  les taches orange restent a faire a la main dans Canva (use cases, pricing, relecture).
                  isComplete gate le bouton "Generer dans Canva" plus bas : si le contenu est incomplet,
                  le bouton est desactive et un badge "Contenu incomplet" avec lien "Corriger" s'affiche. */}
              <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
                <div style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Ce qu'il vous reste à faire</div>
                {[
                  {done:true,  label:'Contexte client rédigé'},
                  {done:true,  label:'Analyses par levier complétées'},
                  {done:true,  label:'Screenshots préaudit capturés'},
                  {done:false, label:'Choisir les use cases (×6)'},
                  {done:false, label:'Importer les screenshots dans Canva'},
                  {done:false, label:'Compléter pricing & projection (manuel)'},
                  {done:false, label:'Relecture finale'},
                  {done:true,  label:'Date R2 & next steps (via Claap R1)'},
                ].map((a,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
                    <div style={{width:20,height:20,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,
                      background:a.done?'rgba(50,215,75,0.15)':'rgba(255,159,10,0.12)',
                      border:`1.5px solid ${a.done?'#32D74B':'#FF9F0A'}`,
                      color:a.done?'#32D74B':'#FF9F0A'}}>
                      <span style={{fontFamily:'system-ui'}}>{a.done?'✓':'!'}</span>
                    </div>
                    <span style={{fontSize:13,color:a.done?'var(--text-2)':'var(--text)'}}>{a.label}</span>
                  </div>
                ))}
              </div>

              {/* Screenshots du préaudit — générés automatiquement par Claude */}
              <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
                <div style={{fontSize:11,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Screenshots préaudit</div>
                <p style={{fontSize:12,color:'var(--text-3)',margin:'0 0 8px'}}>Les screenshots du préaudit ont été générés automatiquement. Téléchargez-les pour les importer dans Canva.</p>
                <button className="btn-p" style={{width:'100%',justifyContent:'center',marginBottom:10}} onClick={async()=>{
                  toastFn('Téléchargement en cours…');
                  try {
                    const files=[
                      {name:'screenshot-SEO.png', url:'slides-thumbs/00-screenshot-SEO.png'},
                      {name:'screenshot-SEA.png', url:'slides-thumbs/00-screenshot-SEA.png'},
                      {name:'screenshot-linkedin.png', url:'slides-thumbs/00-screenshot-linkedin.png'},
                    ];
                    const JSZip=(await import('https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js')).default||window.JSZip;
                    const zip=new JSZip();
                    for(const f of files){
                      const resp=await fetch(f.url);
                      const blob=await resp.blob();
                      zip.file(f.name,blob);
                    }
                    const content=await zip.generateAsync({type:'blob'});
                    const url=URL.createObjectURL(content);
                    window.open(url,'_blank');
                    toastFn('ZIP téléchargé');
                  }catch(e){
                    // Fallback : télécharger les images une par une
                    ['slides-thumbs/00-screenshot-SEO.png','slides-thumbs/00-screenshot-SEA.png','slides-thumbs/00-screenshot-linkedin.png'].forEach(url=>{
                      const a=document.createElement('a');a.href=url;a.download=url.split('/').pop();a.click();
                    });
                    toastFn('Screenshots téléchargés (individuellement)');
                  }
                }}>
                  Télécharger les screenshots (.zip)
                </button>
                {/* Aperçu des screenshots réels du préaudit Bulldozer */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                  {[
                    {label:'SEO',lever:'SEO',src:'slides-thumbs/00-screenshot-SEO.png'},
                    {label:'SEA',lever:'Google Ads',src:'slides-thumbs/00-screenshot-SEA.png'},
                    {label:'LinkedIn',lever:'LinkedIn Ads',src:'slides-thumbs/00-screenshot-linkedin.png'},
                  ].map(s=>{
                    const lc=LEVER_COLORS[s.lever]||{bg:'#555',color:'#fff'};
                    return (
                      <div key={s.label} style={{position:'relative'}}>
                        <img src={s.src} alt={s.label} style={{width:'100%',borderRadius:5,border:'1px solid var(--border)',display:'block'}}/>
                        <span style={{position:'absolute',bottom:3,left:3,fontSize:8,fontWeight:700,padding:'1px 4px',borderRadius:3,background:lc.bg,color:lc.color,fontFamily:'monospace'}}>{s.label}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Right — Diff par section avec toggle */}
            <div className="card" style={{padding:'12px 16px',overflow:'auto',maxHeight:'100%'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:15}}>Modifications par section</div>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn-g" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setDiffExpand(s=>Math.abs(s)+1)}>Tout ouvrir</button>
                  <button className="btn-g" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setDiffExpand(s=>-(Math.abs(s)+1))}>Tout fermer</button>
                </div>
              </div>

              {/* Find & Replace */}
              <DiffSection title="Find & Replace" expandSignal={diffExpand}>
                <div style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',borderRadius:'0 4px 4px 0'}}><span style={{color:'#32D74B'}}>+</span> "XXX" → "{state.clientName}"</div>
              </DiffSection>

              {/* Contexte client */}
              <DiffSection title="Contexte client" tag={<span style={{fontSize:16}}>📋</span>} expandSignal={diffExpand}>
                {(()=>{const ctx=state.contextSummary||{}; return ['entreprise','enjeux','challenges'].map(f=>{
                  const v=ctx[f]?.trim();
                  return v ? (
                    <div key={f} style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                      <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>{f}:</span> <span style={{color:'var(--text-2)'}}>{v.length>55?v.slice(0,55)+'…':v}</span>
                    </div>
                  ) : (
                    <div key={f} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                      <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>{f}:</span> <span style={{color:'#FF453A',fontStyle:'italic'}}>vide</span>
                    </div>
                  );
                });})()}
              </DiffSection>

              {/* Section par levier */}
              {state.activeLevers.map(l=>{
                const a=state.analyses[l];
                const lc=LEVER_COLORS[l]||{bg:'#555',color:'#fff'};
                return (
                  <DiffSection key={l} title={a?`${a.noteGlobale}/10`:''} tag={<span style={{fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:3,background:lc.bg,color:lc.color,fontFamily:'monospace'}}>{l}</span>} expandSignal={diffExpand}>
                    {!a ? (
                      <div style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',borderRadius:'0 4px 4px 0'}}>
                        <span style={{color:'#FF453A'}}>−</span> <span style={{fontStyle:'italic'}}>analyse non générée</span>
                      </div>
                    ) : (<>
                      <div style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                        <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>note:</span> <span style={{color:'var(--text-2)'}}>{a.noteGlobale}/10</span>
                      </div>
                      {a.lectureBusiness?.trim() ? (
                        <div style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                          <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>lecture:</span> <span style={{color:'var(--text-2)'}}>{a.lectureBusiness.length>50?a.lectureBusiness.slice(0,50)+'…':a.lectureBusiness}</span>
                        </div>
                      ) : (
                        <div style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                          <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>lecture:</span> <span style={{color:'#FF453A',fontStyle:'italic'}}>vide</span>
                        </div>
                      )}
                      {a.sousScores.map(ss=>(
                        ss.description?.trim() ? (
                          <div key={ss.nom} style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                            <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>{ss.nom}:</span> <span style={{color:'var(--text-2)'}}>{ss.note}/10 — {ss.description.length>35?ss.description.slice(0,35)+'…':ss.description}</span>
                          </div>
                        ) : (
                          <div key={ss.nom} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                            <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>{ss.nom}:</span> <span style={{color:'#FF453A',fontStyle:'italic'}}>vide</span>
                          </div>
                        )
                      ))}
                    </>)}
                  </DiffSection>
                );
              })}

              {/* Slides supprimées */}
              {json.slides.inactive.length>0&&(
                <DiffSection title={`Slides supprimées (${json.slides.inactive.length})`} expandSignal={diffExpand}>
                  {json.slides.inactive.map(s=>(
                    <div key={s} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                      <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>{s}</span>
                    </div>
                  ))}
                </DiffSection>
              )}
            </div>
          </div>

          {/* Barre d'actions : navigation + CTA Canva */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 0',borderBottom:'1px solid var(--border)',marginBottom:16}}>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-g" onClick={()=>dispatch({t:'STEP',n:3})}>← Review</button>
              <button className="btn-g" onClick={()=>{upsert({...state,status:'brouillon'});window.location.href='index.html';}}>Enregistrer et quitter</button>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {!isComplete&&<span style={{fontSize:13,fontWeight:600,color:'var(--error)',background:'rgba(255,69,58,0.1)',padding:'5px 14px',borderRadius:6,display:'inline-flex',alignItems:'center',gap:8}}>Contenu incomplet <a onClick={()=>dispatch({t:'STEP',n:3})} style={{color:'var(--accent)',textDecoration:'underline',cursor:'pointer',fontWeight:700,fontSize:14}}>Corriger</a></span>}
              <button className="btn-p" onClick={launch} disabled={!isComplete||readOnly}
                style={{padding:'10px 24px',boxShadow:isComplete?'0 0 20px rgba(212,255,0,0.15)':'none'}}>
                {history.length>0?'Mettre à jour dans Canva':'Générer dans Canva'}
              </button>
            </div>
          </div>

          {/* ── Historique des générations avec diff cliquable ──
              Chaque entrée d'historique est cliquable (viewHistoryIdx toggle).
              Au clic, affiche le snapshot complet du JSON au moment du lancement
              sous forme de diff visuel (mêmes lignes vertes/rouges que la vue principale).
              Le snapshot est une copie figée du JSON — il ne change pas si on modifie
              ensuite le contenu, ce qui permet de comparer les versions entre elles. */}
          {history.length>0&&(
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Historique des générations</div>
              {history.map((h,i)=>(
                <div key={i}>
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:viewHistoryIdx===i?'var(--accent-bg)':'var(--bg-card)',border:`1px solid ${viewHistoryIdx===i?'rgba(212,255,0,0.2)':'var(--border)'}`,borderRadius:6,marginBottom:4,cursor:'pointer',transition:'all 0.12s'}}
                    onClick={()=>setViewHistoryIdx(viewHistoryIdx===i?null:i)}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:h.status==='done'?'#32D74B':'var(--accent)',flexShrink:0}}/>
                    <span style={{fontSize:13,color:'var(--text-2)',flex:1}}>
                      {new Date(h.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
                    </span>
                    <span style={{fontSize:12,color:'var(--text-3)'}}>{h.levers.join(', ')}</span>
                    {h.duration&&<span style={{fontSize:12,fontFamily:'monospace',color:'var(--text-3)'}}>{fmtTimer(h.duration)}</span>}
                    <span style={{fontSize:12,fontWeight:600,color:h.status==='done'?'#32D74B':'var(--accent)'}}>{h.status==='done'?'Terminé':'En cours'}</span>
                    <span style={{fontSize:10,color:'var(--text-3)',transform:viewHistoryIdx===i?'rotate(90deg)':'rotate(0)',transition:'transform 0.2s'}}>▶</span>
                  </div>
                  {/* Détail du diff pour cet historique */}
                  {viewHistoryIdx===i&&h.snapshot&&(
                    <div style={{margin:'0 0 8px 18px',padding:'10px 14px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,fontFamily:'monospace',fontSize:12,lineHeight:1.8}}>
                      {/* Find & Replace */}
                      <div style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                        <span style={{color:'#32D74B'}}>+</span> "XXX" → "{h.snapshot.client.name}"
                      </div>
                      {/* Contexte */}
                      {['entreprise','enjeux','challenges'].map(f=>{
                        const v=h.snapshot.content.context_summary[f]?.trim();
                        return v ? (
                          <div key={f} style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                            <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>contexte.{f}:</span> <span style={{color:'var(--text-2)'}}>{v.length>50?v.slice(0,50)+'…':v}</span>
                          </div>
                        ) : (
                          <div key={f} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                            <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>contexte.{f}:</span> <span style={{color:'#FF453A',fontStyle:'italic'}}>vide</span>
                          </div>
                        );
                      })}
                      {/* Analyses */}
                      {Object.entries(h.snapshot.content.analyses).map(([l,a])=>{
                        const lc=LEVER_COLORS[l]||{bg:'#555',color:'#fff'};
                        return (<React.Fragment key={l}>
                          <div style={{padding:'4px 0 2px',fontSize:11,fontWeight:700,color:'var(--text-2)',display:'flex',alignItems:'center',gap:4,marginTop:4}}>
                            <span style={{padding:'1px 4px',borderRadius:3,background:lc.bg,color:lc.color}}>{l}</span> {a.note_globale}/10
                          </div>
                          {a.lecture_business?.trim()&&(
                            <div style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                              <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-2)'}}>{a.lecture_business.length>55?a.lecture_business.slice(0,55)+'…':a.lecture_business}</span>
                            </div>
                          )}
                          {a.sous_scores.map(ss=>(
                            ss.description?.trim() ? (
                              <div key={ss.nom} style={{padding:'2px 8px',background:'rgba(50,215,75,0.08)',borderLeft:'3px solid #32D74B',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                                <span style={{color:'#32D74B'}}>+</span> <span style={{color:'var(--text-3)'}}>{ss.nom}:</span> <span style={{color:'var(--text-2)'}}>{ss.note}/10 — {ss.description.length>35?ss.description.slice(0,35)+'…':ss.description}</span>
                              </div>
                            ) : (
                              <div key={ss.nom} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                                <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>{ss.nom}:</span> <span style={{color:'#FF453A',fontStyle:'italic'}}>vide</span>
                              </div>
                            )
                          ))}
                        </React.Fragment>);
                      })}
                      {/* Slides supprimées */}
                      {h.snapshot.slides.inactive.length>0&&(
                        <div style={{marginTop:4}}>
                          {h.snapshot.slides.inactive.map(s=>(
                            <div key={s} style={{padding:'2px 8px',background:'rgba(255,69,58,0.06)',borderLeft:'3px solid #FF453A',marginBottom:1,borderRadius:'0 4px 4px 0'}}>
                              <span style={{color:'#FF453A'}}>−</span> <span style={{color:'var(--text-3)'}}>slide: {s}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </>
      ) : (
        <>
          {/* Progress bar */}
          <div style={{background:'var(--bg-input)',borderRadius:4,height:4,marginBottom:20,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:4,background:phase==='done'?'#32D74B':'var(--accent)',width:`${Math.min((taskIdx/tasks.length)*100,100)}%`,transition:'width 0.3s',boxShadow:phase==='running'?'0 0 8px rgba(212,255,0,0.4)':undefined}}/>
          </div>

          {/* Task list */}
          <div className="card" style={{flex:1,overflow:'auto',padding:0}}>
            {tasks.map((t,i)=>{
              const done=i<taskIdx;
              const active=i===taskIdx&&phase==='running';
              const pending=i>taskIdx;
              const lc=t.lever?LEVER_COLORS[t.lever]:null;
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',borderBottom:i<tasks.length-1?'1px solid var(--border)':'none',opacity:pending?0.3:1,transition:'opacity 0.3s',background:active?'rgba(212,255,0,0.04)':'transparent'}}>
                  <div style={{width:24,height:24,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,
                    background:done?'rgba(50,215,75,0.15)':active?(lc?lc.bg+'22':'rgba(212,255,0,0.12)'):'var(--bg-input)',
                    border:`1.5px solid ${done?'#32D74B':active?(lc?lc.bg:'var(--accent)'):'var(--border)'}`,
                    color:done?'#32D74B':active?(lc?lc.bg:'var(--accent)'):'var(--text-3)'}}>
                    {done?'✓':t.icon}
                  </div>
                  <span style={{flex:1,fontSize:14,fontWeight:active?700:500,color:done?'var(--text-2)':active?'var(--text)':'var(--text-3)'}}>
                    {t.label}
                    {active&&<span className="dot-loader" style={{marginLeft:8,color:lc?lc.bg:'var(--accent)',fontSize:12}}><span/><span/><span/></span>}
                  </span>
                  {done&&<span style={{fontSize:12,color:'#32D74B'}}>✓</span>}
                  {active&&<span style={{fontSize:12,color:'var(--text-3)',fontFamily:'monospace'}}>{Math.ceil((STEP_DURATION-(elapsed%STEP_DURATION))/1000)}s</span>}
                </div>
              );
            })}
          </div>

          {/* Historique sous la task list */}
          {phase==='done'&&history.length>0&&(
            <div style={{marginTop:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Historique des générations</div>
              {history.map((h,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:6,marginBottom:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:h.status==='done'?'#32D74B':'var(--accent)',flexShrink:0}}/>
                  <span style={{fontSize:13,color:'var(--text-2)',flex:1}}>
                    {new Date(h.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
                  </span>
                  <span style={{fontSize:12,color:'var(--text-3)'}}>{h.levers.join(', ')}</span>
                  {h.duration&&<span style={{fontSize:12,fontFamily:'monospace',color:'var(--text-3)'}}>{fmtTimer(h.duration)}</span>}
                  <span style={{fontSize:12,fontWeight:600,color:h.status==='done'?'#32D74B':'var(--accent)'}}>{h.status==='done'?'Terminé':'En cours'}</span>
                </div>
              ))}
            </div>
          )}

          {/* Lien Canva toujours visible pendant et après la génération */}
          {state.canvaUrl&&phase==='running'&&(
            <div style={{marginTop:12,textAlign:'center'}}>
              <a href={state.canvaUrl} target="_blank" className="btn-s" style={{textDecoration:'none'}}>Ouvrir la présentation Canva (Cmd+Clic)</a>
            </div>
          )}

          {/* Footer */}
          <div style={{marginTop:16,padding:'14px 0 0',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn-g" onClick={()=>dispatch({t:'STEP',n:3})}>← Review</button>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {phase==='done'&&<button className="btn-g" onClick={()=>setPhase('idle')}>Relancer</button>}
              {phase==='done'&&<button className="btn-g" onClick={()=>copy(canvaPrompt,()=>toastFn('Recopié !'))}>Recopier le prompt</button>}
              {phase==='done'&&state.canvaUrl&&<a href={state.canvaUrl} target="_blank" className="btn-s" style={{textDecoration:'none'}}>Ouvrir Canva</a>}
              <button className="btn-p" onClick={()=>{upsert({...state,status:'terminee'});setIsExisting(true);window.location.href='index.html';}}>Terminer</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ÉCRAN DE TRANSITION : FetchingScreen (entre Step 1 et Step 2)
   Animation simulant la récupération des données avant la sélection des leviers :
   1. Lecture du transcript Claap R1
   2. Analyse des leviers à activer
   3. Vérification de l'agenda pour la date R2
   Chaque phase dure quelques secondes avec une barre de progression animée.
   À la fin, redirige automatiquement vers Step 2.
   ═══════════════════════════════════════════════════════════════════════════ */
function FetchingScreen({clientName, claapUrl, onDone}) {
  const [phase,setPhase]=useState(0);   // 0 = script R1, 1 = leviers, 2 = agenda
  const [progress,setProgress]=useState(0);
  const frameRef=useRef(null);
  const startRef=useRef(null);

  const phases=[
    { label:'Lecture du transcript Claap R1',        sub:`Récupération de ${claapUrl||'...'}`,                  duration:3500, icon:'📼', color:'#C8F040' },
    { label:'Récupération des next steps',           sub:'Date R2, actions à mener, points de vigilance',       duration:2500, icon:'📅', color:'#D0A0FF' },
    { label:'Analyse des leviers identifiés',        sub:'Détection des opportunités & priorités par levier',   duration:4000, icon:'🤖', color:'#70D8D0' },
    { label:'Récupération du préaudit',              sub:'Import des données depuis le rapport Bulldozer',      duration:3000, icon:'📊', color:'#80C8FF' },
    { label:'Capture des screenshots préaudit',      sub:'SEO, SEA, LinkedIn Ads — pages du rapport',          duration:2500, icon:'🖼', color:'#FF9870' },
  ];

  useEffect(()=>{
    if(phase>=phases.length){onDone();return;}
    startRef.current=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-startRef.current)/phases[phase].duration,1);
      setProgress(p);
      if(p<1){ frameRef.current=requestAnimationFrame(tick); }
      else { setPhase(ph=>ph+1); setProgress(0); }
    };
    frameRef.current=requestAnimationFrame(tick);
    return()=>{ if(frameRef.current) cancelAnimationFrame(frameRef.current); };
  },[phase]);

  const cur=phases[Math.min(phase,phases.length-1)];

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',padding:'48px'}}>
      {/* Client name */}
      <div style={{marginBottom:48,textAlign:'center'}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Analyse en cours</div>
        <h1 style={{fontSize:34,fontWeight:800,margin:0,letterSpacing:'-0.02em'}}>
          <span style={{color:'var(--accent)'}}>{clientName}</span>
        </h1>
      </div>

      {/* Phase list */}
      <div style={{width:'100%',maxWidth:520}}>
        {phases.map((ph,i)=>{
          const done=i<phase;
          const active=i===phase&&phase<phases.length;
          return (
            <div key={i} style={{marginBottom:20,opacity:i>phase?0.3:1,transition:'opacity 0.4s'}}>
              <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:active?8:0}}>
                <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,
                  background:done?'rgba(50,215,75,0.12)':active?ph.color+'22':'var(--bg-card)',
                  border:`2px solid ${done?'#32D74B':active?ph.color:'var(--border)'}`,
                  transition:'all 0.3s'}}>
                  {done ? <span style={{color:'#32D74B',fontWeight:800,fontSize:14}}>✓</span> : ph.icon}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:active?700:500,color:done?'var(--text-2)':active?'var(--text)':'var(--text-3)',transition:'color 0.2s'}}>{ph.label}</div>
                  {(active||done)&&<div style={{fontSize:14,color:'var(--text-3)',marginTop:2}}>{ph.sub}</div>}
                </div>
                {active&&<div style={{fontSize:14,color:'var(--text-3)',fontFamily:'monospace',flexShrink:0}}>
                  {Math.ceil((1-progress)*ph.duration/1000)}s
                </div>}
              </div>
              {active&&(
                <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,0.06)',overflow:'hidden',position:'relative',marginLeft:50}}>
                  <div style={{height:'100%',borderRadius:2,background:ph.color,width:`${progress*100}%`,transition:'width 0.1s linear',boxShadow:`0 0 8px ${ph.color}88`}}/>
                  <div className="task-bar-shine"/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   COMPOSANT RACINE : App
   - Initialise le state via useReducer (INIT ou LOAD depuis localStorage)
   - Détecte si on ouvre une prez existante via ?id=xxx dans l'URL
   - Pré-remplit le BP connecté depuis les paramètres
   - Gère les raccourcis clavier globaux :
     * Cmd+Shift+C : copier le JSON
     * Flèches droite/gauche : naviguer entre les étapes
     * Escape : retour au dashboard
     * Backspace : retour à l'étape précédente
   - Rend : Sidebar + barre de progression + main (étape courante)
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [state,dispatch]=useReducer(reducer,INIT);
  const {msg,show}=useToast();
  const [fetching,setFetching]=useState(false);

  const [isExisting,setIsExisting]=useState(false); // true si la prez a ete chargee depuis le dashboard (pas une creation)

  /* ── Mode lecture seule (readOnly) ──────────────────────────────────────
     Si un utilisateur est connecte (settings.currentUser) et que la prez
     appartient a un autre BP (state.bp !== currentUser), toute l'interface
     passe en readOnly : les champs sont desactives, les boutons d'action
     sont masques, et un bandeau orange "Lecture seule" s'affiche en haut.
     Cas ou readOnly est false :
     - Aucun BP assigne a la prez (state.bp vide)
     - Aucun utilisateur connecte (currentUser null)
     - Le BP connecte est le proprietaire de la prez */
  const settings=loadSettings();
  const currentUser=settings?.currentUser||null;
  const isOwner=!state.bp||!currentUser||state.bp===currentUser;
  const readOnly=!isOwner;

  /* ── Initialisation au montage ──────────────────────────────────────────
     Deux chemins possibles :
     1. URL avec ?id=xxx : charge la prez existante depuis localStorage via LOAD.
        Le LOAD restaure l'etat complet (y compris currentStep) et marque isExisting=true.
     2. Pas d'id : nouvelle prez. Pre-remplit le BP avec l'utilisateur connecte (si defini)
        pour eviter au BP de se re-selectionner a chaque creation. */
  useEffect(()=>{
    (async () => {
      try {
        // Load BPs from API
        const bps = await apiFetchBPs();
        BPS.length = 0;
        BPS.push(...bps.map(b => b.name));

        const id = new URLSearchParams(window.location.search).get('id');
        if (id) {
          const p = await apiFetchPresentation(id);
          if (p) { dispatch({t:'LOAD',d:p}); setIsExisting(true); }
          return;
        }
        const s = loadSettings();
        if (s && s.currentUser) dispatch({t:'SET',k:'bp',v:s.currentUser});
      } catch (err) { console.error('Init error:', err); }
    })();
  },[]);

  /* ── Auto-save : persiste currentStep dans localStorage ──────────────────
     Se declenche a chaque changement de currentStep ou du nombre de leviers actifs.
     Condition : n'enregistre que si un nom client est saisi OU si c'est une prez existante.
     Cela evite de polluer le localStorage avec des presentations vides.
     Grace a cet effet, l'utilisateur retrouve exactement la bonne etape apres un refresh
     ou une navigation retour (le LOAD dans le reducer restaure currentStep). */
  useEffect(()=>{
    if(state.clientName||isExisting){
      upsert({...state});
    }
  },[state.currentStep,state.activeLevers.length]);

  /** Sauvegarde la prez en brouillon dans localStorage */
  function saveDraft(){
    upsert({...state,status:'brouillon'});
    show('Brouillon sauvegardé');
  }

  /** Quitter avec confirmation : protege contre la perte de donnees.
      Trois scenarios :
      1. Prez existante (chargee depuis le dashboard) : quitte directement,
         car les modifications sont deja sauvegardees au fil de l'eau.
      2. Nouvelle prez sans rien de saisi (step 1, nom vide) : quitte directement,
         rien a perdre.
      3. Nouvelle prez avec du contenu : affiche un confirm() natif du navigateur.
         OK = sauvegarde en brouillon puis quitte. Annuler = quitte sans sauvegarder.
      Appelee par : le bouton Accueil dans la sidebar et le raccourci Escape. */
  function confirmLeave(){
    if(isExisting){window.location.href='index.html';return;}
    if(!state.clientName&&state.currentStep===1){
      window.location.href='index.html';return;
    }
    const choice=confirm('Voulez-vous enregistrer en brouillon avant de quitter ?\n\nOK = Sauvegarder en brouillon\nAnnuler = Quitter sans sauvegarder');
    if(choice) saveDraft();
    window.location.href='index.html';
  }

  /* ── Ref pour beforeunload ──────────────────────────────────────────────
     useRef est necessaire car le listener beforeunload capture la closure au moment
     de l'attachement. Sans ref, isExisting serait toujours false dans le handler
     meme apres le chargement d'une prez existante (stale closure). */
  const isExistingRef=useRef(isExisting);
  useEffect(()=>{isExistingRef.current=isExisting;},[isExisting]);

  /* ── Protection beforeunload ─────────────────────────────────────────
     Empeche la fermeture/rechargement accidentel de la page si l'utilisateur
     est en train de creer une nouvelle presentation (clientName renseigne).
     Desactive si la prez est deja existante (isExistingRef) ou si aucun nom
     n'a ete saisi, car il n'y a rien a perdre dans ces cas.
     e.returnValue='' est requis par la spec du navigateur pour afficher l'alerte. */
  useEffect(()=>{
    const warn=e=>{
      if(!state.clientName||isExistingRef.current) return;
      e.preventDefault();e.returnValue='';
    };
    window.addEventListener('beforeunload',warn);
    return()=>window.removeEventListener('beforeunload',warn);
  },[state.clientName]);

  /* ── Raccourcis clavier globaux (niveau App) ────────────────────────────
     Cmd/Ctrl+Shift+C : copie le JSON complet dans le presse-papier (fonctionne partout)
     Les raccourcis suivants sont desactives dans les champs de saisie et a l'etape 3
     (la Step3Review gere ses propres raccourcis clavier pour la navigation Tinder) :
     - ArrowRight  : etape suivante (steps 1→2→3→4)
     - ArrowLeft   : etape precedente
     - Escape      : quitter avec confirmation (confirmLeave)
     - Backspace   : retour a l'etape precedente */
  useEffect(()=>{
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.shiftKey&&e.key==='c'){copy(JSON.stringify(buildJSON(state),null,2),()=>show('JSON copié !'));return;}
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      if(state.currentStep===3) return; // Step3 a ses propres raccourcis (fleches = cards, pas steps)
      if(e.key==='ArrowRight'&&state.currentStep<4){e.preventDefault();dispatch({t:'STEP',n:state.currentStep+1});}
      if(e.key==='ArrowLeft'&&state.currentStep>1){e.preventDefault();dispatch({t:'STEP',n:state.currentStep-1});}
      if(e.key==='Escape'){e.preventDefault();confirmLeave();}
      if(e.key==='Backspace'&&state.currentStep>1){e.preventDefault();dispatch({t:'STEP',n:state.currentStep-1});}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[state]);

  /* ── Rendu principal ─────────────────────────────────────────────────
     Le Context React (Ctx) diffuse state, dispatch et readOnly a tous les
     composants enfants via useR2(). Cela evite le prop drilling a travers
     les 4 etapes et leurs sous-composants.
     Structure : Sidebar fixe a gauche + zone principale a droite contenant
     le bandeau readOnly (conditionnel), la barre de progression et l'etape courante. */
  return (
    <Ctx.Provider value={{state,dispatch,readOnly}}>
      <div className="shell">
        <Sidebar toastFn={show} onLeave={confirmLeave}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Bandeau lecture seule si le BP connecte n'est pas le proprietaire */}
          {readOnly&&(
            <div style={{padding:'6px 48px',background:'rgba(255,159,10,0.1)',borderBottom:'1px solid rgba(255,159,10,0.2)',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <span style={{fontSize:12,color:'#FF9F0A',fontWeight:600}}>Lecture seule</span>
              <span style={{fontSize:12,color:'var(--text-3)'}}>— Présentation de <strong style={{color:'var(--text-2)'}}>{state.bp}</strong></span>
            </div>
          )}
          <div className="step-bar">
            <div className="step-bar-fill" style={{width:`${(state.currentStep/4)*100}%`}}/>
          </div>
          {/* ── Routage par etape ──
              Step 1 a deux sous-etats : le formulaire (fetching=false) et
              l'ecran de transition FetchingScreen (fetching=true) qui simule
              la recuperation des donnees avant de passer a Step 2. */}
          <main className="main" style={{flex:1}}>
            {state.currentStep===1&&!fetching&&<Step1 onContinue={()=>setFetching(true)}/>}
            {state.currentStep===1&&fetching&&<FetchingScreen clientName={state.clientName} claapUrl={state.claapUrl} onDone={()=>{setFetching(false);dispatch({t:'STEP',n:2});}}/>}
            {state.currentStep===2&&<Step2/>}
            {state.currentStep===3&&<Step3Review toastFn={show}/>}
            {state.currentStep===4&&<StepCanva toastFn={show}/>}
          </main>
        </div>
      </div>
      {msg&&<div className="toast">{msg}</div>}
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
